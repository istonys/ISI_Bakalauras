# 1 etapas: visu modeliu palyginimas LIEPA + DEMAND duomenu rinkinyje (10%).
# Tikslas: pasirinkti geriausia architektura LIETUVIU kalbai, kuri bus toliau
# treniruojama pilnoje LIEPA aibeje. Voicebank rezultatai bus naudojami kaip
# palyginamasis baseline ne kaip pagrindinis screeningo signalas.
defaults:
  dataset_name: liepa
  train_manifest: /scratch/lustre/home/${USER}/data/LIEPA_DEMAND/train_manifest.csv
  val_manifest: /scratch/lustre/home/${USER}/data/LIEPA_DEMAND/val_manifest.csv
  test_manifest: /scratch/lustre/home/${USER}/data/LIEPA_DEMAND/test_manifest.csv
  seed: 42
  epochs: 20
  # 256 batch_size: V100 32GB GPU can easily handle this (was 16 — 16x too small).
  batch_size: 256
  learning_rate: 0.001
  target_sample_rate: 16000
  n_fft: 1024
  hop_length: 256
  win_length: 1024
  segment_seconds: 2.0
  subset_fraction: 0.02
  max_files_to_eval: 100
  save_example_count: 2
  # 10 workers + 12 CPUs = workers nekonkuruoja su pagrindine programa.
  num_workers: 10
  early_stopping: true
  patience: 6
  min_delta: 0.0001
  # Screeningui train-eval nereikalingas – tik val_loss svarbus renkantis architektura.
  # Tai sutaupo ~50% laiko per eksperimentą (28 x 20 epochų = 560 mažiau pasibegimų).
  compute_train_eval_loss: false
  compute_test_loss: false
  eval_every_n_epochs: 5
  eval_mode: full_chunks
  results_dir: results
  checkpoints_dir: checkpoints
  device: auto
  use_amp: true
  # LR scheduler ir grad clipping – geresnė konvergencija.
  use_lr_scheduler: true
  lr_scheduler_patience: 3
  lr_scheduler_factor: 0.5
  # Gradient clipping - prevents exploding gradients.
  grad_clip_norm: 5.0
